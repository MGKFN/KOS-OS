# ============================================================
#  K-DOS-1.0-Beta  —  GRUB2 Boot Configuration
#  This file tells GRUB how to load our kernel.
#  GRUB reads this from the ISO at boot time.
# ============================================================

# How many seconds GRUB waits before auto-booting.
# Set to 0 for instant boot, or higher for debugging.
set timeout=3

# Which menu entry boots by default (0 = first entry).
set default=0

# The boot menu entry the user sees.
menuentry "K-DOS 1.0 Beta" {

    # Tell GRUB our kernel is a Multiboot2-compliant ELF binary.
    # 'multiboot2' is the command that loads it and passes a
    # memory/hardware info structure to our kernel entry point.
    multiboot2 /boot/kernel.elf

    # Hand control to the kernel. After this line, GRUB is done
    # and our Assembly entry point takes over.
    boot
}
